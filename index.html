<script>
    const N8N_WEBHOOK_URL = 'https://n8n.srv1000189.hstgr.cloud/webhook/abraconta-checkout-criar-cobranca';

    const prices = {
        'abertura': 1678.80,
        'transferencia': 1198.80
    };

    const planNames = {
        'abertura': 'Abertura de Empresa',
        'transferencia': 'Transferência de Contabilidade'
    };

    const interestRatePerMonth = 0.0249;

    document.addEventListener('DOMContentLoaded', () => {
        updateSummary();
    });

    function updateSummary() {
        const selectedPlan = document.querySelector('input[name="plan"]:checked').value;
        const price = prices[selectedPlan];
        const name = planNames[selectedPlan];

        document.getElementById('summaryPlanName').innerText = name;
        document.getElementById('summaryPlanPrice').innerText = price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('summaryTotal').innerText = price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        const installmentsSelect = document.getElementById('installments');
        installmentsSelect.innerHTML = '';

        for (let i = 1; i <= 12; i++) {
            let installmentValue = price;
            let text = '';

            if (i === 1) {
                text = `1x de ${price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} (Sem juros)`;
            } else {
                const iRate = interestRatePerMonth;
                const coef = iRate / (1 - Math.pow(1 + iRate, -i));
                installmentValue = price * coef;
                text = `${i}x de ${installmentValue.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} (Com juros)`;
            }

            const option = document.createElement('option');
            option.value = i;
            option.text = text;
            if (i === 12) option.selected = true;
            installmentsSelect.appendChild(option);
        }
    }

    function maskCpf(input) {
        let v = input.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        input.value = v;
    }

    function maskCpfCnpj(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length <= 11) {
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        } else {
            v = v.replace(/^(\d{2})(\d)/, "$1.$2");
            v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
            v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
            v = v.replace(/(\d{4})(\d)/, "$1-$2");
        }
        input.value = v;
    }

    function maskPhone(input) {
        let v = input.value.replace(/\D/g, "");
        v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
        v = v.replace(/(\d)(\d{4})$/, "$1-$2");
        input.value = v;
    }

    function maskCard(input) {
        let v = input.value.replace(/\D/g, "");
        v = v.replace(/(\d{4})(?=\d)/g, "$1 ");
        input.value = v;
    }

    function maskExpiry(input) {
        let v = input.value.replace(/\D/g, "");
        v = v.replace(/(\d{2})(\d)/, "$1/$2");
        input.value = v;
    }

    document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnSubmit');
        const errorContainer = document.getElementById('errorMessage');

        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> A processar...';
        btn.disabled = true;
        if (errorContainer) errorContainer.classList.add('hidden');

        const selectedPlan = document.querySelector('input[name="plan"]:checked').value;
        const expiryParts = document.getElementById('cardExpiry').value.split('/');

        const payload = {
            plan: selectedPlan,
            customer: {
                name: document.getElementById('customerName').value,
                cpf: document.getElementById('customerCpf').value.replace(/\D/g, ''),
                email: document.getElementById('customerEmail').value,
                phone: document.getElementById('customerPhone').value.replace(/\D/g, '')
            },
            payment: {
                billingType: 'CREDIT_CARD',
                value: prices[selectedPlan],
                installmentCount: parseInt(document.getElementById('installments').value),
                cpfCnpj: document.getElementById('paymentCpfCnpj').value.replace(/\D/g, ''),
                creditCard: {
                    holderName: document.getElementById('cardHolderName').value.toUpperCase(),
                    number: document.getElementById('cardNumber').value.replace(/\D/g, ''),
                    expiryMonth: expiryParts[0],
                    expiryYear: expiryParts[1],
                    ccv: document.getElementById('cardCvv').value
                }
            }
        };

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.success) {
                alert(`Obrigado! Pagamento enviado com sucesso.\nID do Pagamento: ${data.data.payment_id || data.data.paymentId || 'gerado'}`);
            } else {
                if (errorContainer) {
                    errorContainer.innerText = `Erro: ${data.message || 'Falha ao enviar para o n8n.'}`;
                    errorContainer.classList.remove('hidden');
                } else {
                    alert(`Erro: ${data.message || 'Falha ao enviar para o n8n.'}`);
                }
            }

        } catch (error) {
            if (errorContainer) {
                errorContainer.innerText = "Erro ao conectar com o webhook do n8n.";
                errorContainer.classList.remove('hidden');
            } else {
                alert("Erro ao conectar com o webhook do n8n.");
            }
        } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    });
</script>
